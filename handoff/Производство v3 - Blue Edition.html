<style>
/* ── KORT · Calm Enterprise Design Tokens (Blue Edition) ── */
:root {
  /* Backgrounds */
  --bg-page:          #f5f7fb;
  --bg-surface:       #ffffff;
  --bg-surface-inset: #f8fafb;
  --bg-surface-muted: #eef1f5;

  /* Text */
  --text-primary:   #1d2738;
  --text-secondary: #495563;
  --text-tertiary:  #7a8591;
  --text-muted:     #a4aeb7;

  /* Borders */
  --border:        #d4dce5;
  --border-soft:   #e3e8ef;
  --border-strong: #c0cad5;

  /* Accent (vibrant blue) */
  --accent:        #2563eb;
  --accent-hover:  #1d4ed8;
  --accent-light:  rgba(37,99,235,.11);
  --accent-medium: rgba(37,99,235,.18);

  /* Status: success */
  --ok:         #059669;
  --ok-light:   rgba(5,150,105,.11);
  --ok-border:  rgba(5,150,105,.22);

  /* Status: warning (urgent) */
  --warn:        #dc2626;
  --warn-light:  rgba(220,38,38,.11);
  --warn-border: rgba(220,38,38,.22);

  /* Status: error */
  --err:        #9333ea;
  --err-light:  rgba(147,51,234,.11);
  --err-border: rgba(147,51,234,.22);

  /* Status: info (vip) */
  --info:        #0891b2;
  --info-light:  rgba(8,145,178,.11);
  --info-border: rgba(8,145,178,.22);

  /* Typography */
  --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif;
  --font-mono: "JetBrains Mono", "Monaco", monospace;

  /* Radii */
  --r:     12px;
  --r-sm:   8px;
  --r-xs:   6px;

  /* Shadows */
  --shadow-sm: 0 1px 3px rgba(29,39,56,.06);
  --shadow-md: 0 4px 16px rgba(29,39,56,.08);

  /* Layout */
  --sidebar-w: 220px;
  --cols: 44px 32px 64px 1fr 60px 140px 160px 60px 64px 80px 80px 90px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body, #root { width: 100%; height: 100%; overflow: hidden; }
body {
  font-family: var(--font-sans);
  background: var(--bg-page);
  color: var(--text-primary);
  font-size: 13px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* ── SHELL ── */
.shell { display: flex; height: 100vh; overflow: hidden; }

/* ── SIDEBAR ── */
.chapan-nav {
  width: var(--sidebar-w);
  background: var(--bg-surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow-y: auto;
}
.chapan-brand {
  padding: 18px 18px 16px;
  border-bottom: 1px solid var(--border);
}
.chapan-brand-tag {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 4px;
}
.chapan-brand-name {
  font-size: 15px;
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: -.01em;
}
.chapan-links { flex: 1; padding: 6px 0; }
.chapan-link {
  display: flex;
  align-items: center;
  gap: 9px;
  width: 100%;
  padding: 9px 18px;
  background: none;
  border: none;
  border-left: 2px solid transparent;
  cursor: pointer;
  font-family: var(--font-sans);
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
  text-align: left;
  transition: all 100ms;
}
.chapan-link:hover { background: var(--bg-surface-muted); color: var(--text-primary); }
.chapan-link.active {
  background: var(--accent-light);
  color: var(--accent);
  border-left-color: var(--accent);
  font-weight: 600;
}
.chapan-link svg { flex-shrink: 0; opacity: .7; }
.chapan-link.active svg { opacity: 1; }

/* ── MAIN ── */
.wh-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

/* ── PAGE HEADER ── */
.page-header {
  padding: 16px 24px 0;
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.page-title {
  font-size: 19px;
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: -.02em;
  margin-bottom: 12px;
}
.page-subtitle {
  font-size: 12px;
  color: var(--text-tertiary);
  font-weight: 400;
  margin-left: 2px;
  margin-top: 2px;
}
.toolbar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding-bottom: 12px;
  flex-wrap: nowrap;
}

/* ── TOOLBAR CONTROLS ── */
.tb-search {
  flex: 1;
  min-width: 160px;
  max-width: 240px;
  padding: 7px 12px;
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  background: var(--bg-surface-inset);
  font-size: 13px;
  color: var(--text-primary);
  font-family: var(--font-sans);
  outline: none;
  transition: border-color 120ms;
}
.tb-search:focus { border-color: var(--accent); }
.tb-search::placeholder { color: var(--text-muted); }
.tb-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 12px;
  background: var(--bg-surface-inset);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  font-size: 12px;
  font-weight: 500;
  color: var(--text-secondary);
  cursor: pointer;
  font-family: var(--font-sans);
  white-space: nowrap;
  transition: all 100ms;
  flex-shrink: 0;
}
.tb-btn:hover { border-color: var(--border-strong); color: var(--text-primary); }
.tb-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
.tb-btn.primary {
  background: var(--accent);
  color: var(--bg-surface);
  border-color: var(--accent);
}
.tb-btn.primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
.tb-divider { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }

/* ── DATE POPOVER ── */
.pop-wrap { position: relative; }
.date-pop {
  position: absolute;
  top: calc(100% + 6px);
  left: 0;
  z-index: 200;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  box-shadow: var(--shadow-md);
  padding: 10px;
  display: none;
}
.date-pop.open { display: block; }
.date-inp {
  width: 100%;
  padding: 7px 10px;
  border: 1px solid var(--border);
  border-radius: var(--r-xs);
  font-size: 12px;
  color: var(--text-primary);
  font-family: var(--font-sans);
  background: var(--bg-surface-inset);
  outline: none;
}
.date-inp:focus { border-color: var(--accent); }

/* ── SELECTION BAR ── */
.sel-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 24px;
  background: var(--accent-light);
  border-bottom: 1px solid var(--accent-medium);
  flex-shrink: 0;
}
.sel-cnt { font-size: 12px; font-weight: 600; color: var(--accent); }

/* ── TABLE ── */
.list-area { flex: 1; overflow-y: auto; background: var(--bg-page); }
.table-head {
  display: grid;
  grid-template-columns: var(--cols);
  background: linear-gradient(to bottom, rgba(37,99,235,.35), rgba(37,99,235,.28));
  border-bottom: 1px solid rgba(37,99,235,.2);
  position: sticky;
  top: 0;
  z-index: 10;
  padding: 0 12px;
  box-shadow: 0 1px 2px rgba(37,99,235,.04);
}
.th {
  padding: 10px 6px;
  font-size: 9px;
  font-weight: 900;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: .08em;
  display: flex;
  align-items: center;
  justify-content: flex-start;
  height: 38px;
}
.th.center { justify-content: center; }
.th svg { margin-right: 5px; flex-shrink: 0; }
.list-inner {
  display: flex;
  flex-direction: column;
  gap: 6px;
  padding: 12px;
}

/* ── TASK CARD (each position is separate) ── */
.task-card {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  transition: box-shadow 120ms;
}
.task-card:hover { box-shadow: var(--shadow-md); }
.task-card.is-urgent { border-color: var(--warn-border); }
.task-card.is-vip    { border-color: var(--info-border); }

/* ── ROW container (with 2 rows for note support) ── */
.row {
  display: grid;
  grid-template-columns: var(--cols);
  grid-template-rows: 42px auto;
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border);
  transition: background 120ms;
  padding: 0;
  align-items: stretch;
}
.row.without-note { grid-template-rows: 42px; }
.row.without-note .cell { border-bottom: none; }
.row:hover { background: var(--bg-surface-muted); }
.row.is-sel { background: var(--accent-light) !important; }

/* cells */
.cell {
  padding: 0 10px;
  font-size: 12px;
  display: flex;
  align-items: center;
  justify-content: flex-start;
  overflow: hidden;
  grid-row: 1;
  height: 42px;
}
.cell.center { justify-content: center; }
.cell.mono { font-family: var(--font-mono); font-size: 11px; }
.cell-muted { color: var(--text-muted); }

/* Divider structure: vertical lines between ALL columns including 6-7 */
.cell.col-1, .cell.col-2, .cell.col-3, .cell.col-4, .cell.col-5, .cell.col-6,
.cell.col-7, .cell.col-8, .cell.col-9, .cell.col-10, .cell.col-11 {
  border-right: 1px solid var(--border);
}
/* Last column (12) has no right border */
.cell.col-12 {
  border-right: none;
}

/* Dates (col-10, col-11) should always be center */
.cell.col-10, .cell.col-11 {
  justify-content: center;
}

/* cells that span 2 rows (ALL cells when note present) */
.cell.span-2 { 
  grid-row: 1 / 3;
  align-self: center;
  justify-self: center;
}

/* note cell - transparent background, centered */
.cell-note {
  grid-column: 4 / 8;
  grid-row: 2;
  background: transparent;
  padding: 0 10px;
  font-size: 12px;
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  border-top: 1px dashed var(--border);
  border-left: 1px solid var(--border);
  border-right: 1px solid var(--border);
  border-bottom: none;
  height: auto;
  min-height: 30px;
}
.cell-note svg { opacity: 0.5; flex-shrink: 0; }

/* ── CHECKBOX ── */
.cb-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
}
.cb {
  width: 15px;
  height: 15px;
  border-radius: 4px;
  border: 1.5px solid var(--border-strong);
  background: var(--bg-surface);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 100ms;
  cursor: pointer;
}
.cb.checked { background: var(--accent); border-color: var(--accent); }
.cb-tick {
  width: 7px;
  height: 4.5px;
  border-left: 1.5px solid #fff;
  border-bottom: 1.5px solid #fff;
  transform: rotate(-45deg) translateY(-1px);
}

/* ── URGENCY BADGE ── */
.badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  font-size: 9px;
  font-weight: 800;
  flex-shrink: 0;
}
.badge.urgent { background: var(--warn-light); color: var(--warn); border: 1px solid var(--warn-border); }
.badge.vip    { background: var(--info-light);  color: var(--info);  border: 1px solid var(--info-border); }

/* ── ORDER NUMBER ── */
.order-num { color: var(--accent); font-weight: 600; font-size: 11px; font-family: var(--font-mono); }

/* ── PRODUCT NAME ── */
.product-name { font-weight: 600; color: var(--text-primary); font-size: 13px; }

/* ── DONE BUTTON ── */
.done-btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 5px 10px;
  border-radius: var(--r-xs);
  border: 1px solid var(--ok-border);
  background: var(--ok-light);
  color: var(--ok);
  font: 11px/1 var(--font-sans);
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition: all 100ms;
}
.done-btn:hover { background: rgba(5,150,105,.2); }

/* ── EMPTY ── */
.empty {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 160px;
  color: var(--text-muted);
  font-size: 13px;
  border: 1.5px dashed var(--border);
  border-radius: var(--r);
  margin: 12px;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(29,39,56,.12); border-radius: 10px; }
</style>

    bDueDate.setHours(0, 0, 0, 0);
    
    // Check if overdue (due date < today)
    const aOverdue = aDueDate < today;
    const bOverdue = bDueDate < today;
    
    // 1. Overdue (with same due date) first
    if (aOverdue && bOverdue) {
      // Both overdue: sort by due date ascending
      if (aDueDate !== bDueDate) return aDueDate.getTime() - bDueDate.getTime();
      // Same due date: urgent first
      return a.order.urgent ? -1 : 1;
    }
    if (aOverdue !== bOverdue) return aOverdue ? -1 : 1;
    
    // 2. Not overdue: sort by due date ascending
    if (aDueDate !== bDueDate) return aDueDate.getTime() - bDueDate.getTime();
    
    // 3. Same due date: urgent first
    if (a.order.urgent !== b.order.urgent) return a.order.urgent ? -1 : 1;
    
    // 4. Same everything: keep original order
    return 0;
  });
}

/* ── Date popover ── */
function DateFilter({ label, value, onChange }) {
  const [open, setOpen] = useState(false);
  const ref = useRef();
  useEffect(() => {
    const h = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', h);
    return () => document.removeEventListener('mousedown', h);
  }, []);
  return (
    <div className="pop-wrap" ref={ref}>
      <button className={`tb-btn${value ? ' active' : ''}`} onClick={() => setOpen(v => !v)}>
        <Ico d={I.calendar} size={12} /> {label}
      </button>
      <div className={`date-pop${open ? ' open' : ''}`}>
        <input type="date" className="date-inp"
          value={value || ''}
          onChange={e => { onChange(e.target.value || null); setOpen(false); }} />
        {value && (
          <button onClick={() => { onChange(null); setOpen(false); }}
            style={{ marginTop: 6, fontSize: 11, color: 'var(--text-tertiary)', background: 'none', border: 'none', cursor: 'pointer', padding: '2px 0' }}>
            Сбросить
          </button>
        )}
      </div>
    </div>
  );
}

/* ── Task row (unified grid) ── */
function TaskRow({ task, selected, onToggle, onDone }) {
  const urgent  = task.order.urgent;
  const vip     = !urgent && task.order.vip;
  const hasNote = !!task.notes;
  const orderNum = `${task.order.num.replace('ORD-', '')}-${task.position}`;

  return (
    <div className={`row${selected ? ' is-sel' : ''}${!hasNote ? ' without-note' : ' with-note'}`}>
      {/* Checkbox — col 1 */}
      <div className={`cell center cb-wrap col-1${hasNote ? ' span-2' : ''}`} style={{ gridColumn: 1 }} onClick={() => onToggle(task.id)}>
        <div className={`cb${selected ? ' checked' : ''}`}>
          {selected && <div className="cb-tick"></div>}
        </div>
      </div>

      {/* Urgency badge — col 2 */}
      <div className={`cell center col-2${hasNote ? ' span-2' : ''}`} style={{ gridColumn: 2 }}>
        {urgent && <span className="badge urgent">!</span>}
        {vip    && <span className="badge vip">★</span>}
      </div>

      {/* Order number — col 3 */}
      <div className={`cell mono order-num col-3${hasNote ? ' span-2' : ''}`} style={{ gridColumn: 3 }}>
        №{orderNum}
      </div>

      {/* Product name — col 4 */}
      <div className={`cell product-name col-4`} style={{ gridColumn: 4 }}>
        {task.product}
      </div>

      {/* Gender — col 5 */}
      <div className={`cell center col-5`} style={{ gridColumn: 5, color: 'var(--text-secondary)' }}>
        {task.gender}
      </div>

      {/* Length — col 6 */}
      <div className={`cell col-6${task.length ? '' : ' cell-muted'}`} style={{ gridColumn: 6, color: task.length ? 'var(--text-secondary)' : undefined }}>
        {task.length || '—'}
      </div>

      {/* Color — col 7 (hidden when has note) */}
      {!hasNote && (
        <div className={`cell col-7${task.color ? '' : ' cell-muted'}`} style={{ gridColumn: 7, color: task.color ? 'var(--text-secondary)' : undefined }}>
          {task.color || '—'}
        </div>
      )}

      {/* Quantity — col 8 */}
      <div className={`cell center col-8${hasNote ? ' span-2' : ''}`} style={{ gridColumn: 8, fontWeight: 600 }}>
        {task.quantity}
      </div>

      {/* Size — col 9 */}
      <div className={`cell center col-9${hasNote ? ' span-2' : ''}`} style={{ gridColumn: 9, fontWeight: 600 }}>
        {task.size}
      </div>

      {/* Received date — col 10 */}
      <div className={`cell cell-muted col-10${hasNote ? ' span-2' : ''}`} style={{ gridColumn: 10 }}>
        {fmtDate(task.order.recv)}
      </div>

      {/* Due date — col 11 */}
      <div className={`cell cell-muted col-11${hasNote ? ' span-2' : ''}`} style={{ gridColumn: 11 }}>
        {fmtDate(task.order.due)}
      </div>

      {/* Done button — col 12 */}
      <div className={`cell center col-12${hasNote ? ' span-2' : ''}`} style={{ gridColumn: 12 }}>
        <button className="done-btn" onClick={() => onDone(task.id)}>
          <Ico d={I.check} size={10} /> Готово
        </button>
      </div>

      {/* Note row — grid column 4-7, row 2 (only if note present) */}
      {/* Note row — only if note present */}
      {hasNote && (
        <div className="cell-note">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="9" r="1.5" fill="white" opacity="0.8"/><circle cx="8" cy="14" r="1.5" fill="white" opacity="0.8"/><circle cx="16" cy="14" r="1.5" fill="white" opacity="0.8"/></svg>
          {task.notes}
        </div>
      )}
    </div>
  );
}

/* ── Task card (single position) ── */
function TaskCard({ task, selected, onToggle, onDone }) {
  const urgent = task.order.urgent;
  const vip    = !urgent && task.order.vip;
  const cls    = `task-card${urgent ? ' is-urgent' : !urgent && vip ? ' is-vip' : ''}`;

  return (
    <div className={cls}>
      <TaskRow task={task} position={1} selected={selected} onToggle={onToggle} onDone={onDone} />
    </div>
  );
}

/* ── App ── */
function App() {
  const [search, setSearch]       = useState('');
  const [dueFilter, setDueFilter] = useState(null);
  const [recvFilter, setRecvFilter] = useState(null);
  const [selected, setSelected]   = useState(new Set());
  const [done, setDone]           = useState(new Set());
  const [hideUnsel, setHideUnsel] = useState(false);
  const [activeNav, setActiveNav] = useState('production');

  const tasks = useMemo(() => {
    let r = ALL_TASKS.filter(t => !done.has(t.id));
    if (search) {
      const q = search.toLowerCase();
      r = r.filter(t => t.order.num.toLowerCase().includes(q) || t.product.toLowerCase().includes(q));
    }
    if (dueFilter)  r = r.filter(t => t.order.due  === dueFilter);
    if (recvFilter) r = r.filter(t => t.order.recv === recvFilter);
    if (hideUnsel && selected.size > 0) r = r.filter(t => selected.has(t.id));
    const sorted = sortTasks(r);
    
    // Add position numbers within each order
    const withPos = [];
    const orderPos = new Map();
    for (const t of sorted) {
      const pos = (orderPos.get(t.order.num) || 0) + 1;
      orderPos.set(t.order.num, pos);
      withPos.push({ ...t, position: pos });
    }
    return withPos;
  }, [search, dueFilter, recvFilter, selected, hideUnsel, done]);

  const orderGroups = useMemo(() => {
    return tasks;
  }, [tasks]);

  const toggleSel = id => {
    const n = new Set(selected);
    n.has(id) ? n.delete(id) : n.add(id);
    setSelected(n);
  };
  const markDone = id => {
    setDone(p => { const n = new Set(p); n.add(id); return n; });
    setSelected(p => { const n = new Set(p); n.delete(id); return n; });
  };

  return (
    <div className="shell">
      {/* ── Sidebar ── */}
      <nav className="chapan-nav">
        <div className="chapan-brand">
          <div className="chapan-brand-tag">KORT · Чапан</div>
          <div className="chapan-brand-name">Производство</div>
        </div>
        <div className="chapan-links">
          {NAV.map(n => (
            <button key={n.id}
              className={`chapan-link${activeNav === n.id ? ' active' : ''}`}
              onClick={() => setActiveNav(n.id)}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
                <path d={n.icon} />
              </svg>
              {n.label}
            </button>
          ))}
        </div>
      </nav>

      {/* ── Main ── */}
      <div className="wh-main">
        <div className="page-header">
          <div className="page-title">
            Цех
            <span style={{ fontWeight: 400, fontSize: 13, color: 'var(--text-muted)', marginLeft: 10 }}>
              {tasks.length} позиций
            </span>
          </div>

          <div className="toolbar">
            <div style={{ position: 'relative', display: 'flex', alignItems: 'center' }}>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
                style={{ position: 'absolute', left: 10 }}>
                <path d={I.search} />
              </svg>
              <input className="tb-search" style={{ paddingLeft: 30 }}
                placeholder="Заказ или товар…"
                value={search}
                onChange={e => setSearch(e.target.value)} />
            </div>

            <DateFilter label="Срок сдачи" value={dueFilter}  onChange={setDueFilter}  />
            <DateFilter label="Принят"     value={recvFilter} onChange={setRecvFilter} />

            <div className="tb-divider"></div>

            {selected.size > 0 && (
              <button className={`tb-btn${hideUnsel ? ' active' : ''}`}
                onClick={() => setHideUnsel(v => !v)}>
                <Ico d={I.eye} size={12} />
                {hideUnsel ? 'Все' : 'Только выбранные'}
              </button>
            )}
          </div>
        </div>

        {/* Selection bar */}
        {selected.size > 0 && (
          <div className="sel-bar">
            <div style={{ display:'flex', alignItems:'center', gap:8 }}>
              <div className="cb checked" style={{ cursor:'pointer' }}
                onClick={() => setSelected(new Set())}>
                <div className="cb-tick"></div>
              </div>
              <span className="sel-cnt">{selected.size} выбрано</span>
            </div>
          </div>
        )}

        <div className="list-area">
          {/* Table header */}
          <div className="table-head">
            <div className="th center">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M20 6L9 17l-5-5" />
              </svg>
            </div>
            <div className="th center">!</div>
            <div className="th center">№</div>
            <div className="th center">Товар</div>
            <div className="th center">Пол</div>
            <div className="th center">Длина</div>
            <div className="th center">Цвет</div>
            <div className="th center">Кол.во</div>
            <div className="th center">Разм.</div>
            <div className="th center">Принят</div>
            <div className="th center">Срок</div>
            <div className="th center">Действие</div>
          </div>

          {orderGroups.length === 0 ? (
            <div className="empty">Нет позиций</div>
          ) : (
            <div className="list-inner">
              {orderGroups.map(t => (
                <TaskCard key={t.id} task={t}
                  selected={selected.has(t.id)}
                  onToggle={toggleSel} onDone={markDone} />
              ))}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
